<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>规划档案</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: oklch(0.965 0.006 95);
  --surface: oklch(0.985 0.004 95);
  --text: oklch(0.22 0.012 95);
  --text-muted: oklch(0.48 0.014 95);
  --accent: oklch(0.52 0.15 22);
  --accent-dim: oklch(0.62 0.12 22);
  --border: oklch(0.85 0.015 95 / 0.6);
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.06);
  --shadow-md: 0 4px 20px oklch(0 0 0 / 0.07), 0 1px 3px oklch(0 0 0 / 0.04);
  --shadow-lg: 0 12px 40px oklch(0 0 0 / 0.10), 0 2px 6px oklch(0 0 0 / 0.05);
  --radius: 6px;
}

html {
  font-size: clamp(15px, 1.05vw, 17px);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: oklch(0.985 0.004 95 / 0.88);
  backdrop-filter: blur(12px) saturate(1.4);
  -webkit-backdrop-filter: blur(12px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 0 clamp(1.5rem, 4vw, 4rem);
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.logo {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.logo::before {
  content: '';
  display: block;
  width: 10px;
  height: 10px;
  background: var(--accent);
  border-radius: 2px;
}

/* ── Nav ── */
.nav-list {
  display: flex;
  list-style: none;
  gap: 0.25rem;
  align-items: center;
}

.nav-item { position: relative; }

.nav-link {
  display: block;
  padding: 0.5rem 1.1rem;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-muted);
  text-decoration: none;
  border-radius: var(--radius);
  transition: color 0.2s ease, background 0.2s ease;
  cursor: pointer;
  user-select: none;
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
}

.nav-link:hover {
  color: var(--text);
  background: oklch(0 0 0 / 0.04);
}

.nav-link.active {
  color: var(--accent);
  background: oklch(0.52 0.15 22 / 0.08);
  font-weight: 600;
}

.nav-link.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
}

/* ── Main Layout ── */
.main-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
  padding: 0 clamp(1.5rem, 4vw, 4rem);
}

/* ── Section Header ── */
.section-meta {
  padding: 2.5rem 0 1.8rem;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-shrink: 0;
}

.section-title {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.section-count {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}

/* ── Pages Container ── */
.pages-viewport {
  position: relative;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

.pages-track {
  display: flex;
  flex-direction: column;
  height: 100%;
  transition: transform 0.55s cubic-bezier(0.22, 0.61, 0.36, 1);
}

.page {
  flex: 0 0 100%;
  display: flex;
  align-items: center;
  padding: 0.5rem 0 2rem;
}

.page-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(1.5rem, 3vw, 2.5rem);
  width: 100%;
}

/* ── PDF Card ── */
.pdf-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  padding: 1.6rem 1.8rem;
  display: flex;
  gap: 1.2rem;
  transition: box-shadow 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.pdf-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: var(--accent);
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
}

.pdf-card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
  border-color: oklch(0.52 0.15 22 / 0.25);
}

.pdf-card:hover::before {
  transform: scaleY(1);
}

.pdf-icon {
  flex-shrink: 0;
  width: 52px;
  height: 64px;
  background: oklch(0.95 0.015 22);
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent);
  position: relative;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}

.pdf-icon::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 0;
  height: 0;
  border-style: solid;
  border-width: 0 14px 14px 0;
  border-color: transparent var(--bg) transparent transparent;
}

.pdf-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.pdf-title {
  font-size: 0.98rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.35rem;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.pdf-meta {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  gap: 1rem;
  align-items: center;
}

.pdf-meta span {
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

/* ── Pagination ── */
.pagination-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 1.5rem 0 2.5rem;
  flex-shrink: 0;
}

.page-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: oklch(0.7 0.02 95);
  border: none;
  cursor: pointer;
  transition: background 0.3s ease, transform 0.3s ease, width 0.3s ease;
  padding: 0;
}

.page-dot:hover { background: var(--accent-dim); }

.page-dot.active {
  background: var(--accent);
  width: 28px;
  border-radius: 4px;
}

/* ── Scroll hint ── */
.scroll-hint {
  text-align: center;
  padding: 0.6rem 0 0;
  font-size: 0.75rem;
  color: var(--text-muted);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  flex-shrink: 0;
  opacity: 0.6;
}

/* ── Empty State ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 1rem;
  color: var(--text-muted);
}

.empty-state .empty-icon {
  font-size: 2.5rem;
  opacity: 0.3;
}

.empty-state .empty-text {
  font-size: 0.9rem;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .page-inner { grid-template-columns: 1fr; }
  .nav-link { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
  .site-header { padding: 0 1rem; }
  .main-wrapper { padding: 0 1rem; }
  .pdf-card { padding: 1.2rem; }
  .section-title { font-size: 1.3rem; }
}

@media (max-width: 480px) {
  .nav-list { gap: 0; }
  .nav-link { padding: 0.35rem 0.55rem; font-size: 0.75rem; }
  .section-meta { flex-direction: column; gap: 0.3rem; }
}

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  .pages-track { transition: none; }
  .pdf-card { transition: none; }
  .pdf-card::before { transition: none; }
}

/* ── Focus ── */
.nav-link:focus-visible,
.page-dot:focus-visible,
.pdf-card:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="#" aria-label="规划档案首页">规划档案</a>
    <nav aria-label="主导航">
      <ul class="nav-list" id="navList"></ul>
    </nav>
  </div>
</header>

<main class="main-wrapper">
  <div class="section-meta">
    <h2 class="section-title" id="sectionTitle">A 类规划</h2>
    <span class="section-count" id="sectionCount"></span>
  </div>

  <div class="pages-viewport" id="viewport">
    <div class="pages-track" id="track"></div>
  </div>

  <nav class="pagination-bar" id="pagination" aria-label="页面导航"></nav>

  <p class="scroll-hint">滚轮翻页 · 最多 5 页 · 点击圆点直达</p>
</main>

<script>
/* ── Data ── */
const CATEGORIES = ['A', 'B', 'C', 'D', 'E', 'F'];

// Simulated PDF database — each category holds a list of PDF entries
const pdfDB = {
  A: [
    { title: 'A 类 · 年度战略规划纲要', pages: 42, date: '2026-03-15', size: '2.4 MB' },
    { title: 'A 类 · 市场拓展路线图', pages: 28, date: '2026-04-02', size: '1.9 MB' },
    { title: 'A 类 · 产品迭代计划书', pages: 35, date: '2026-05-10', size: '3.1 MB' },
    { title: 'A 类 · 组织架构优化方案', pages: 19, date: '2026-05-28', size: '1.2 MB' },
    { title: 'A 类 · 技术架构升级规划', pages: 56, date: '2026-06-14', size: '4.8 MB' },
    { title: 'A 类 · 品牌建设三年计划', pages: 31, date: '2026-06-30', size: '2.0 MB' },
    { title: 'A 类 · 供应链韧性评估报告', pages: 44, date: '2026-07-05', size: '3.6 MB' },
    { title: 'A 类 · 预算分配与效益分析', pages: 22, date: '2026-07-08', size: '1.5 MB' },
    { title: 'A 类 · ESG 可持续发展规划', pages: 38, date: '2026-07-09', size: '2.8 MB' },
    { title: 'A 类 · 数字化转型白皮书', pages: 61, date: '2026-07-10', size: '5.2 MB' },
  ],
  B: [
    { title: 'B 类 · 区域市场渗透策略', pages: 33, date: '2026-02-20', size: '2.2 MB' },
    { title: 'B 类 · 客户体验提升计划', pages: 25, date: '2026-03-11', size: '1.7 MB' },
    { title: 'B 类 · 销售渠道重构方案', pages: 40, date: '2026-04-18', size: '3.3 MB' },
    { title: 'B 类 · 合作伙伴生态规划', pages: 29, date: '2026-05-22', size: '2.1 MB' },
  ],
  C: [
    { title: 'C 类 · 研发资源分配计划', pages: 47, date: '2026-01-08', size: '3.9 MB' },
    { title: 'C 类 · 质量管控体系规划', pages: 36, date: '2026-02-14', size: '2.7 MB' },
    { title: 'C 类 · 知识产权布局策略', pages: 21, date: '2026-03-30', size: '1.6 MB' },
    { title: 'C 类 · 实验室建设五年规划', pages: 53, date: '2026-06-01', size: '4.4 MB' },
    { title: 'C 类 · 专利池扩充路线图', pages: 18, date: '2026-07-02', size: '1.1 MB' },
  ],
  D: [
    { title: 'D 类 · 人才引进与培养规划', pages: 27, date: '2026-01-22', size: '2.0 MB' },
    { title: 'D 类 · 绩效激励体系设计', pages: 34, date: '2026-04-05', size: '2.6 MB' },
    { title: 'D 类 · 企业文化落地纲要', pages: 16, date: '2026-06-19', size: '0.9 MB' },
  ],
  E: [
    { title: 'E 类 · 财务风控体系建设', pages: 41, date: '2026-03-01', size: '3.5 MB' },
    { title: 'E 类 · 投融资策略规划', pages: 30, date: '2026-05-15', size: '2.3 MB' },
    { title: 'E 类 · 成本优化专项行动', pages: 23, date: '2026-06-25', size: '1.8 MB' },
    { title: 'E 类 · 税务筹划年度报告', pages: 19, date: '2026-07-07', size: '1.3 MB' },
  ],
  F: [
    { title: 'F 类 · IT 基础设施蓝图', pages: 48, date: '2026-02-08', size: '4.1 MB' },
    { title: 'F 类 · 数据治理成熟度评估', pages: 37, date: '2026-04-22', size: '2.9 MB' },
    { title: 'F 类 · 网络安全加固方案', pages: 26, date: '2026-05-30', size: '1.9 MB' },
    { title: 'F 类 · 云计算迁移路线图', pages: 55, date: '2026-07-01', size: '4.6 MB' },
    { title: 'F 类 · DevOps 转型实施计划', pages: 32, date: '2026-07-09', size: '2.5 MB' },
    { title: 'F 类 · AI 平台建设白皮书', pages: 60, date: '2026-07-10', size: '5.5 MB' },
  ],
};

// Max pages visible per category
const MAX_PAGES = 5;
const ITEMS_PER_PAGE = 2;

/* ── State ── */
let activeCategory = 'A';
let currentPage = 0;

/* ── DOM refs ── */
const navList = document.getElementById('navList');
const sectionTitle = document.getElementById('sectionTitle');
const sectionCount = document.getElementById('sectionCount');
const track = document.getElementById('track');
const pagination = document.getElementById('pagination');
const viewport = document.getElementById('viewport');

/* ── Build Nav ── */
function buildNav() {
  navList.innerHTML = CATEGORIES.map(cat => {
    const cls = cat === activeCategory ? 'nav-link active' : 'nav-link';
    return `<li class="nav-item"><a class="${cls}" data-cat="${cat}" role="tab" aria-selected="${cat === activeCategory}">${cat} 类</a></li>`;
  }).join('');

  navList.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      const cat = link.dataset.cat;
      if (cat !== activeCategory) switchCategory(cat);
    });
  });
}

/* ── Switch Category ── */
function switchCategory(cat) {
  activeCategory = cat;
  currentPage = 0;
  renderAll();
  buildNav();
  viewport.scrollTop = 0;
}

/* ── Render All ── */
function renderAll() {
  const pdfs = pdfDB[activeCategory] || [];
  const totalPages = Math.min(Math.ceil(pdfs.length / ITEMS_PER_PAGE), MAX_PAGES);

  // Title
  sectionTitle.textContent = `${activeCategory} 类规划`;
  sectionCount.textContent = `共 ${pdfs.length} 份文档 · ${totalPages} 页`;

  // Pages
  track.innerHTML = '';
  for (let p = 0; p < totalPages; p++) {
    const start = p * ITEMS_PER_PAGE;
    const items = pdfs.slice(start, start + ITEMS_PER_PAGE);
    const pageEl = document.createElement('div');
    pageEl.className = 'page';
    pageEl.innerHTML = `<div class="page-inner">${items.map(renderCard).join('')}</div>`;
    track.appendChild(pageEl);
  }

  // Pagination dots
  pagination.innerHTML = '';
  for (let p = 0; p < totalPages; p++) {
    const dot = document.createElement('button');
    dot.className = 'page-dot' + (p === currentPage ? ' active' : '');
    dot.setAttribute('aria-label', `第 ${p + 1} 页`);
    dot.addEventListener('click', () => goToPage(p));
    pagination.appendChild(dot);
  }

  // Track height = viewport height * totalPages
  track.style.height = `calc(100% * ${totalPages})`;
  goToPage(currentPage, false);
}

/* ── Render Card ── */
function renderCard(pdf) {
  return `
    <article class="pdf-card" tabindex="0" role="button" aria-label="${pdf.title}">
      <div class="pdf-icon">PDF</div>
      <div class="pdf-info">
        <h3 class="pdf-title">${pdf.title}</h3>
        <div class="pdf-meta">
          <span>${pdf.pages} 页</span>
          <span>${pdf.date}</span>
          <span>${pdf.size}</span>
        </div>
      </div>
    </article>`;
}

/* ── Go To Page ── */
function goToPage(pageIdx, animate = true) {
  const pdfs = pdfDB[activeCategory] || [];
  const totalPages = Math.min(Math.ceil(pdfs.length / ITEMS_PER_PAGE), MAX_PAGES);
  if (pageIdx < 0) pageIdx = 0;
  if (pageIdx >= totalPages) pageIdx = totalPages - 1;

  currentPage = pageIdx;

  if (!animate) {
    track.style.transition = 'none';
  }

  track.style.transform = `translateY(-${currentPage * (100 / totalPages)}%)`;

  if (!animate) {
    // Force reflow then restore transition
    track.offsetHeight;
    track.style.transition = '';
  }

  // Update dots
  pagination.querySelectorAll('.page-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === currentPage);
  });
}

/* ── Wheel / Scroll Handling ── */
let wheelAccumulator = 0;
const WHEEL_THRESHOLD = 50;

viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  wheelAccumulator += e.deltaY;

  if (Math.abs(wheelAccumulator) >= WHEEL_THRESHOLD) {
    const direction = wheelAccumulator > 0 ? 1 : -1;
    wheelAccumulator = 0;
    goToPage(currentPage + direction);
  }
}, { passive: false });

/* ── Keyboard ── */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    goToPage(currentPage + 1);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    goToPage(currentPage - 1);
  }
});

/* ── Touch ── */
let touchStartY = 0;
viewport.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

viewport.addEventListener('touchend', (e) => {
  const delta = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(delta) > 40) {
    goToPage(currentPage + (delta > 0 ? 1 : -1));
  }
});

/* ── Init ── */
buildNav();
renderAll();

/* ── Resize recalculation ── */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    goToPage(currentPage, false);
  }, 150);
});
</script>

</body>
</html>
