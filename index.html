<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>规划档案</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: oklch(0.965 0.006 95);
  --surface: oklch(0.985 0.004 95);
  --text: oklch(0.22 0.012 95);
  --text-muted: oklch(0.48 0.014 95);
  --accent: oklch(0.52 0.15 22);
  --accent-dim: oklch(0.62 0.12 22);
  --border: oklch(0.85 0.015 95 / 0.6);
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.06);
  --shadow-md: 0 4px 20px oklch(0 0 0 / 0.07), 0 1px 3px oklch(0 0 0 / 0.04);
  --shadow-lg: 0 12px 40px oklch(0 0 0 / 0.10), 0 2px 6px oklch(0 0 0 / 0.05);
  --radius: 6px;
}

html {
  font-size: clamp(15px, 1.05vw, 17px);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: oklch(0.985 0.004 95 / 0.88);
  backdrop-filter: blur(12px) saturate(1.4);
  -webkit-backdrop-filter: blur(12px) saturate(1.4);
  border-bottom: 1px solid var(--border);
  padding: 0 clamp(1.5rem, 4vw, 4rem);
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.logo {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.logo::before {
  content: '';
  display: block;
  width: 10px;
  height: 10px;
  background: var(--accent);
  border-radius: 2px;
}

/* ── Nav ── */
.nav-list {
  display: flex;
  list-style: none;
  gap: 0.25rem;
  align-items: center;
}

.nav-item { position: relative; }

.nav-link {
  display: block;
  padding: 0.5rem 1.1rem;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-muted);
  text-decoration: none;
  border-radius: var(--radius);
  transition: color 0.2s ease, background 0.2s ease;
  cursor: pointer;
  user-select: none;
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
}

.nav-link:hover {
  color: var(--text);
  background: oklch(0 0 0 / 0.04);
}

.nav-link.active {
  color: var(--accent);
  background: oklch(0.52 0.15 22 / 0.08);
  font-weight: 600;
}

.nav-link.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
}

/* ── Main Layout ── */
.main-wrapper {
  flex: 1;
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
  padding: 0 clamp(1.5rem, 4vw, 4rem);
  display: flex;
  flex-direction: column;
}

/* ── Section Header ── */
.section-meta {
  padding: 2.2rem 0 1.2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.section-title-group { display: flex; align-items: baseline; gap: 0.8rem; }

.section-title {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.section-count {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}

/* ── Upload Button ── */
.upload-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.55rem 1.2rem;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--surface);
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
  box-shadow: var(--shadow-sm);
}

.upload-btn:hover { background: oklch(0.47 0.14 22); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.upload-btn:active { transform: translateY(0); }

.upload-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

/* ── Drop Zone ── */
.drop-zone {
  border: 2px dashed oklch(0.75 0.02 95);
  border-radius: var(--radius);
  padding: 2rem;
  text-align: center;
  color: var(--text-muted);
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 0.9rem;
  transition: border-color 0.25s ease, background 0.25s ease;
  margin-bottom: 1.5rem;
  cursor: pointer;
  flex-shrink: 0;
}

.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent-dim);
  background: oklch(0.52 0.15 22 / 0.04);
}

.drop-zone-text { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
.drop-zone-text strong { color: var(--accent); font-weight: 600; }

#fileInput { display: none; }

/* ── Content Grid ── */
.content-scroll {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 3rem;
}

.pdf-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(1.5rem, 3vw, 2.5rem);
}

/* ── PDF Card ── */
.pdf-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: box-shadow 0.25s ease, border-color 0.25s ease;
}

.pdf-card:hover {
  box-shadow: var(--shadow-lg);
  border-color: oklch(0.52 0.15 22 / 0.2);
}

/* Card header */
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.8rem 1.2rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.card-title {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 75%;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}

.card-actions {
  display: flex;
  gap: 0.4rem;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.pdf-card:hover .card-actions { opacity: 1; }

.card-btn {
  width: 28px;
  height: 28px;
  border: none;
  background: oklch(0 0 0 / 0.05);
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: background 0.15s ease, color 0.15s ease;
}

.card-btn:hover { background: oklch(1 0 0 / 0.08); color: oklch(0.52 0.18 15); }
.card-btn.delete-btn:hover { background: oklch(0.55 0.2 15 / 0.12); color: oklch(0.52 0.18 15); }

.card-btn svg { width: 14px; height: 14px; }

/* Card scroll area */
.card-scroll {
  flex: 1;
  max-height: 65vh;
  overflow-y: auto;
  position: relative;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.card-scroll::-webkit-scrollbar { width: 0; }

.pdf-card:hover .card-scroll {
  scrollbar-width: thin;
  scrollbar-color: oklch(0.7 0.02 95) transparent;
}

.pdf-card:hover .card-scroll::-webkit-scrollbar {
  width: 5px;
}

.pdf-card:hover .card-scroll::-webkit-scrollbar-track {
  background: transparent;
}

.pdf-card:hover .card-scroll::-webkit-scrollbar-thumb {
  background: oklch(0.68 0.025 95);
  border-radius: 4px;
}

.pdf-card:hover .card-scroll::-webkit-scrollbar-thumb:hover {
  background: oklch(0.55 0.03 95);
}

/* Canvas wrapper for overlay */
.canvas-stack {
  position: relative;
  display: flex;
  flex-direction: column;
}

.canvas-stack canvas {
  display: block;
  width: 100%;
  height: auto;
}

/* Overlay mask at bottom of page 5 */
.overlay-mask {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 96px;
  background: linear-gradient(to top, oklch(0.985 0.004 95 / 0.96) 0%, oklch(0.985 0.004 95 / 0.6) 50%, transparent 100%);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 14px;
  pointer-events: none;
}

.overlay-text {
  font-size: 0.82rem;
  font-weight: 600;
  color: oklch(0.52 0.15 22 / 0.85);
  background: oklch(0.985 0.004 95 / 0.75);
  padding: 0.25rem 1rem;
  border-radius: 3px;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  letter-spacing: 0.04em;
}

/* ── Empty State ── */
.empty-state {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 2rem;
  color: var(--text-muted);
  gap: 0.8rem;
}

.empty-state svg { opacity: 0.25; width: 48px; height: 48px; }

.empty-state p {
  font-size: 0.9rem;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}

/* ── Loading spinner inside card ── */
.card-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem;
}

.card-spinner {
  width: 24px;
  height: 24px;
  border: 2.5px solid oklch(0.8 0.02 95);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: oklch(0.25 0.01 95);
  color: oklch(0.95 0.005 95);
  padding: 0.7rem 1.5rem;
  border-radius: var(--radius);
  font-size: 0.85rem;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  z-index: 999;
  opacity: 0;
  transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.3s ease;
  pointer-events: none;
  box-shadow: var(--shadow-lg);
}

.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .pdf-grid { grid-template-columns: 1fr; }
  .nav-link { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
  .site-header { padding: 0 1rem; }
  .main-wrapper { padding: 0 1rem; }
  .section-title { font-size: 1.3rem; }
  .card-scroll { max-height: 55vh; }
}

@media (max-width: 480px) {
  .nav-list { gap: 0; }
  .nav-link { padding: 0.35rem 0.55rem; font-size: 0.75rem; }
  .section-meta { flex-direction: column; gap: 0.8rem; align-items: flex-start; }
}

@media (prefers-reduced-motion: reduce) {
  .pdf-card, .upload-btn, .card-btn, .toast, .card-spinner { transition: none; animation: none; }
}

.nav-link:focus-visible,
.upload-btn:focus-visible,
.card-btn:focus-visible,
.drop-zone:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="#" aria-label="规划档案首页">规划档案</a>
    <nav aria-label="主导航">
      <ul class="nav-list" id="navList"></ul>
    </nav>
  </div>
</header>

<main class="main-wrapper">
  <div class="section-meta">
    <div class="section-title-group">
      <h2 class="section-title" id="sectionTitle">A 类规划</h2>
      <span class="section-count" id="sectionCount"></span>
    </div>
    <button class="upload-btn" id="uploadBtn" aria-label="上传PDF">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      上传 PDF
    </button>
  </div>

  <div class="drop-zone" id="dropZone" tabindex="0">
    <div class="drop-zone-text">
      <strong>拖拽 PDF 文件到此处</strong>
      <span>或点击"上传 PDF"按钮选择文件</span>
      <span style="font-size:0.75rem;opacity:0.6;">每个 PDF 预览前 5 页</span>
    </div>
  </div>

  <input type="file" id="fileInput" accept="application/pdf" multiple>

  <div class="content-scroll" id="contentScroll">
    <div class="pdf-grid" id="pdfGrid"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ── Constants ── */
const CATEGORIES = ['A', 'B', 'C', 'D', 'E', 'F'];
const MAX_PREVIEW_PAGES = 5;
const DB_NAME = 'pdfArchiveDB';
const DB_VERSION = 1;
const STORE_NAME = 'pdfs';

/* ── State ── */
let activeCategory = 'A';
let db = null;

/* ── DOM refs ── */
const navList = document.getElementById('navList');
const sectionTitle = document.getElementById('sectionTitle');
const sectionCount = document.getElementById('sectionCount');
const pdfGrid = document.getElementById('pdfGrid');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const uploadBtn = document.getElementById('uploadBtn');
const toast = document.getElementById('toast');

/* ═══════════════ IndexedDB ═══════════════ */
function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        const store = d.createObjectStore(STORE_NAME, { keyPath: 'id' });
        store.createIndex('category', 'category', { unique: false });
      }
    };
    request.onsuccess = (e) => resolve(e.target.result);
    request.onerror = (e) => reject(e.target.error);
  });
}

function dbAdd(record) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).add(record);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

function dbGetByCategory(category) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const index = store.index('category');
    const results = [];
    index.openCursor(IDBKeyRange.only(category)).onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) { results.push(cursor.value); cursor.continue(); }
    };
    tx.oncomplete = () => resolve(results);
    tx.onerror = (e) => reject(e.target.error);
  });
}

/* ═══════════════ Toast ═══════════════ */
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

/* ═══════════════ Navigation ═══════════════ */
function buildNav() {
  navList.innerHTML = CATEGORIES.map(cat => {
    const cls = cat === activeCategory ? 'nav-link active' : 'nav-link';
    return `<li class="nav-item"><a class="${cls}" data-cat="${cat}" role="tab" aria-selected="${cat === activeCategory}">${cat} 类</a></li>`;
  }).join('');

  navList.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      const cat = link.dataset.cat;
      if (cat !== activeCategory) switchCategory(cat);
    });
  });
}

async function switchCategory(cat) {
  activeCategory = cat;
  buildNav();
  await renderGrid();
}

/* ═══════════════ PDF Rendering ═══════════════ */
async function renderPage(pdfDoc, pageNum, containerWidth) {
  const page = await pdfDoc.getPage(pageNum);
  const viewport = page.getViewport({ scale: 1 });
  const scale = (containerWidth - 2) / viewport.width;
  const scaledViewport = page.getViewport({ scale });

  const canvas = document.createElement('canvas');
  canvas.width = scaledViewport.width;
  canvas.height = scaledViewport.height;
  canvas.style.width = '100%';
  canvas.style.height = 'auto';

  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;
  return canvas;
}

/* ═══════════════ Grid ═══════════════ */
async function renderGrid() {
  sectionTitle.textContent = `${activeCategory} 类规划`;

  const records = await dbGetByCategory(activeCategory);
  sectionCount.textContent = `共 ${records.length} 份文档`;

  if (records.length === 0) {
    pdfGrid.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>暂无规划文档，请上传 PDF</p>
      </div>`;
    return;
  }

  // Build card shells
  pdfGrid.innerHTML = records.map(r => `
    <article class="pdf-card" data-id="${r.id}">
      <div class="card-header">
        <span class="card-title" title="${escapeHtml(r.name)}">${escapeHtml(r.name)}</span>
        <div class="card-actions">
          <button class="card-btn download-btn" title="下载" data-id="${r.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="card-btn delete-btn" title="删除" data-id="${r.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          </button>
        </div>
      </div>
      <div class="card-scroll">
        <div class="card-loading"><div class="card-spinner"></div></div>
      </div>
    </article>
  `).join('');

  // Async render each card's PDF pages
  const cards = pdfGrid.querySelectorAll('.pdf-card');
  for (const card of cards) {
    const id = card.dataset.id;
    const record = records.find(r => r.id === id);
    if (!record) continue;

    const scrollEl = card.querySelector('.card-scroll');
    const containerWidth = scrollEl.clientWidth || 500;

    try {
      const pdfDoc = await pdfjsLib.getDocument({ data: record.data }).promise;
      const totalPages = Math.min(pdfDoc.numPages, MAX_PREVIEW_PAGES);

      const canvases = [];
      for (let p = 1; p <= totalPages; p++) {
        const canvas = await renderPage(pdfDoc, p, containerWidth);
        canvases.push(canvas);
      }

      scrollEl.innerHTML = '';
      const stack = document.createElement('div');
      stack.className = 'canvas-stack';
      canvases.forEach(c => stack.appendChild(c));

      // Overlay mask on last canvas
      if (canvases.length > 0) {
        const overlay = document.createElement('div');
        overlay.className = 'overlay-mask';
        overlay.innerHTML = '<span class="overlay-text">定制请联系旺旺</span>';
        stack.appendChild(overlay);
      }

      scrollEl.appendChild(stack);
    } catch (err) {
      scrollEl.innerHTML = `<div class="empty-state"><p style="font-size:0.82rem;">PDF 加载失败</p></div>`;
      console.error('PDF render error:', err);
    }
  }

  bindCardActions();
}

/* ═══════════════ Card Actions ═══════════════ */
function bindCardActions() {
  pdfGrid.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (confirm('确定要删除这份文档吗？')) {
        await dbDelete(id);
        showToast('文档已删除');
        await renderGrid();
      }
    });
  });

  pdfGrid.querySelectorAll('.download-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const records = await dbGetByCategory(activeCategory);
      const record = records.find(r => r.id === id);
      if (!record) return;
      const blob = new Blob([record.data], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = record.name + '.pdf';
      a.click();
      URL.revokeObjectURL(url);
    });
  });
}

/* ═══════════════ Upload ═══════════════ */
async function handleFiles(files) {
  if (!files.length) return;

  let added = 0;
  for (const file of files) {
    if (file.type !== 'application/pdf') {
      showToast(`"${file.name}" 不是 PDF 文件，已跳过`);
      continue;
    }

    const arrayBuffer = await file.arrayBuffer();
    const id = `${activeCategory}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    const record = {
      id,
      category: activeCategory,
      name: file.name.replace(/\.pdf$/i, ''),
      data: new Uint8Array(arrayBuffer),
      pages: 0,
      uploadDate: new Date().toISOString().slice(0, 10)
    };

    try {
      await dbAdd(record);
      added++;
    } catch (err) {
      console.error('DB add error:', err);
      showToast(`"${file.name}" 存储失败`);
    }
  }

  if (added > 0) {
    showToast(`已添加 ${added} 份文档到「${activeCategory} 类」`);
    await renderGrid();
  }
}

uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  handleFiles(fileInput.files);
  fileInput.value = '';
});

/* ═══════════════ Drag & Drop ═══════════════ */
dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

dropZone.addEventListener('click', () => fileInput.click());

/* ═══════════════ Helpers ═══════════════ */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ═══════════════ Init ═══════════════ */
(async () => {
  try {
    db = await openDB();
  } catch (err) {
    console.error('IndexedDB init error:', err);
    showToast('本地存储初始化失败，上传功能可能不可用');
  }
  buildNav();
  await renderGrid();
})();
</script>

</body>
